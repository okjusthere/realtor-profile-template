<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Kevv AI — AI-Powered Agent Pages for Real Estate Professionals</title>
    <meta name="description" content="Create your professional real estate agent page powered by AI. Lead capture, AI chatbot, premium templates — all on Kevv AI." />
    <meta name="keywords" content="real estate, agent page, AI chatbot, lead capture, Kevv AI, agent website" />
    <meta property="og:title" content="Kevv AI — AI-Powered Agent Pages" />
    <meta property="og:description" content="Create your professional real estate agent page powered by AI. Lead capture, chatbot, 7 premium templates." />
    <meta property="og:type" content="profile" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT?.trim();
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID?.trim();

      if (endpoint && websiteId) {
        const analyticsScript = document.createElement("script");
        analyticsScript.defer = true;
        analyticsScript.src = `${endpoint.replace(/\/$/, "")}/umami`;
        analyticsScript.dataset.websiteId = websiteId;
        document.body.appendChild(analyticsScript);
      }
    </script>
  </body>

</html>
